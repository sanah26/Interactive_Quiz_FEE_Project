    questions2[current].answer;

    // EXPLANATION
    document.getElementById("popupExplanation").innerHTML =
    questions2[current].explanation;

    // IMAGE
    document.getElementById("popupImage").src =
    questions2[current].image;

    // SHOW POPUP
    document.getElementById("popup").style.display ="flex";
}

// WRONG ANSWER
else{

    options[index].style.background = "#fee2e2";

    // TITLE
    document.getElementById("popupTitle").innerHTML =
    "❌ Wrong Answer";

    // CORRECT ANSWER
    document.getElementById("correctAnswer").innerHTML =
    questions2[current].answer;

    // EXPLANATION
    document.getElementById("popupExplanation").innerHTML =
    questions2[current].explanation;

    // IMAGE
    document.getElementById("popupImage").src =
    questions2[current].image;

    // SHOW POPUP
    document.getElementById("popup").style.display ="flex";
}}


// CLOSE POPUP
function closePopup(){

    document.getElementById("popup").style.display = "none";

    current++;

    if(current < questions2.length){
        loadQuestion();
    }
    else{
        endQuiz();
    }
}

// END QUIZ
function endQuiz(){

    clearInterval(timer);

    // store score
    sessionStorage.setItem("score", score);
    sessionStorage.setItem("total", questions2.length);

    //high score
    let highScore = localStorage.getItem("highScore") || 0;
    if(score > highScore){
        localStorage.setItem("highScore",score);
    }

    //leader board
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

    leaderboard.push({
        score: score,
        time: new Date().toLocaleTimeString()
    });

    localStorage.setItem("leaderboard",JSON.stringify(leaderboard));

    // redirect
    window.location.href = "06_RESULT_PAGE_@.html";
}

loadQuestion();
