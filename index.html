<!DOCTYPE html>
<html>
    <!DOCTYPE html>
<html>
    <head>
        <title>CosmoQuiz</title>
        <meta charset = "UTF-8"> <!--Supports all characters-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Responsive Designing-->
        <link rel="stylesheet" href="styling.css"> <!--External Linking of CSS file-->
        <link rel="icon" type="image/png" href="favicon.png"> <!--Favicon-->
    </head>
    <body>

        <div class="login-container">

            <div id="messageBox" class="message-box"></div>

            <div class="login-card">

                <div class="login-icon">🪐</div>

                <h1>Create Account</h1>
                <p>Join the intergalactic academy.</p>
                
                <input type="text" id="signupUsername" placeholder="Enter Username">

                <input type="email" id="signupEmail" placeholder="Enter Email">
                
                <input type="password" id="signupPassword" placeholder="Create Password">

                <input type="password" id="confirmPassword" placeholder="Confirm Password">

                <input type="number" id="signupAge" placeholder="Enter Age">

                <button onclick="signupUser()">
                    Sign Up
                </button>

                <div class="auth-links">
                    <a href="02_LOGIN_PAGE_@.html">Already have an account?</a>
                </div>
            </div>
        </div>

       <script>

function showMessage(text){

    let box =
    document.getElementById("messageBox");

    box.innerHTML = text;

    box.classList.add("show");

    setTimeout(function(){

        box.classList.remove("show");

    },3000);
}

function signupUser(){

    let username = document.getElementById("signupUsername").value;

    let email = document.getElementById("signupEmail").value;

    let password = document.getElementById("signupPassword").value;

    let confirmPassword = document.getElementById("confirmPassword").value;

    let age = document.getElementById("signupAge").value;

    // EMPTY FIELDS
    if(username === "" || email === "" || password === "" || confirmPassword === "" || age === ""){

        showMessage(
            "Please fill all fields ⚠️"
        );

        return;
    }

    if(password !== confirmPassword){
        showMessage(
            "Passwords do not match ❌"
        );
        return;
    }

    // SAVE ACCOUNT
    localStorage.setItem('username',username);
    
    localStorage.setItem("email", email);

    localStorage.setItem("password", password);

    localStorage.setItem("age", age);

    showMessage(
        "Account Created Successfully 🚀"
    );

    setTimeout(function(){

        window.location.href =
        "02_LOGIN_PAGE_@.html";

    },1500);
}

</script>
    </body>
</html>
