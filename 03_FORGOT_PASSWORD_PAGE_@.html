<!DOCTYPE html>
<html>
    <head>
        <title>CosmoQuiz</title>
        <meta charset = "UTF-8"> <!--Supports all characters-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Responsive Designing-->
        <link rel="stylesheet" href="styling.css"> <!--External Linking of CSS file-->
        <link rel="icon" type="image/png" href="favicon.png"> <!--Favicon-->
    </head>
    <body>

        <div class="login-container">

            <div id="messageBox" class="message-box"></div>

            <div id="resetPopup" class="reset-popup">

    <div class="reset-card">

        <h2>🔐 Reset Password</h2>

        <input type="password" id="newPassword" placeholder="Enter New Password">

        <button onclick="saveNewPassword()">
            Update Password
        </button>

    </div>

</div>

            <div class="login-card">

                <div class="login-icon">🌌</div>

                <h1>Forgot Password</h1>

                <p>Recover your CosmoQuiz password.</p>

                <input type="email" id="forgotEmail" placeholder="Enter Registered Email">

                <button onclick="recoverPassword()">
                    Recover Password
                </button>

                <div class="auth-links">
                    <a href="02_LOGIN_PAGE_@.html">Back to Login</a>
                </div>
            </div>
        </div>

        <script>

function showMessage(text){

    let box =
    document.getElementById("messageBox");

    box.innerHTML = text;

    box.classList.add("show");

    setTimeout(function(){

        box.classList.remove("show");

    },3000);
}

// OPEN RESET POPUP
function recoverPassword(){

    let email =
    document.getElementById("forgotEmail").value;

    let savedEmail =
    localStorage.getItem("email");

    // EMAIL FOUND
    if(email === savedEmail){

        document
        .getElementById("resetPopup")
        .classList.add("show");
    }

    // EMAIL NOT FOUND
    else{

        showMessage(
            "Email Not Found ❌"
        );
    }
}

// SAVE PASSWORD
function saveNewPassword(){

    let newPassword =
    document.getElementById("newPassword").value;

    if(newPassword === ""){

        showMessage(
            "Enter New Password ⚠️"
        );

        return;
    }

    localStorage.setItem(
        "password",
        newPassword
    );

    document
    .getElementById("resetPopup")
    .classList.remove("show");

    showMessage(
        "Password Updated Successfully 🚀"
    );

    setTimeout(function(){

        window.location.href =
        "02_LOGIN_PAGE_@.html";

    },1500);
}

</script>
        
    </body>
</html>
